# config.toml.example
#
# Copy this file to config.toml and fill in the values for your setup.
# config.toml is gitignored and should never be committed.
#
# Config is also readable from environment variables (see docs/README.md).
# TOML sections map to QUARRY_* env vars; this file is the preferred day-to-day path.

# ---------------------------------------------------------------------------
# Runtime mode and profile
# ---------------------------------------------------------------------------
[runtime]

# mode: controls which components are allowed to run
#   hybrid  — local-first with optional hosted generation (recommended default)
#   local   — strict local only; startup fails if local models are not warmed
#   hosted  — all generation delegated to the hosted LLM
mode = "hybrid"

# profile: selects the local model stack
#   apple_silicon          — MLX-based Qwen models; best for Apple Silicon
#   gpu — standard HuggingFace models; for Linux/Windows with a GPU
profile = "apple_silicon"

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
[paths]

# Where to find raw source documents (PDFs, .md, .txt)
corpus_dir = "data/sources"

# Where QUARRY writes generated index artifacts
artifacts_dir = "data/artifacts"

# Where model weights are cached (can grow to 10+ GB)
# Remove this line to use the default HuggingFace cache (~/.cache/huggingface)
model_cache_dir = "data/model-cache"

# ---------------------------------------------------------------------------
# Hosted LLM (required only when use_live_generation = true)
# Supports any OpenAI-compatible API endpoint (OpenRouter, OpenAI, etc.)
# ---------------------------------------------------------------------------
[hosted]

# Base URL for the OpenAI-compatible chat API
llm_base_url = "https://openrouter.ai/api/v1"

# Your API key — keep this secret, never commit it
llm_api_key = "YOUR_API_KEY_HERE"

# Model identifier as accepted by the API
llm_model = "openai/gpt-4o-mini"

# Toggle individual hosted tasks — set to true to offload to the hosted model
use_live_generation            = true   # answer / supplement / refinement generation
use_live_decomposition         = false  # query decomposition (local is usually fine)
use_live_metadata_enrichment   = false  # chunk metadata enrichment (local is usually fine)

# ---------------------------------------------------------------------------
# MLX local models (used when profile = "apple_silicon")
# ---------------------------------------------------------------------------
[mlx]

# Text model for decomposition, enrichment, and local generation
text_model = "mlx-community/Qwen3.5-4B-MLX-4bit"

# Vision-language model for PDF page parsing
vision_model = "mlx-community/Qwen3-VL-4B-Instruct-4bit"

# Token budget for local generation responses
max_new_tokens = 768

# Longest page dimension (pixels) when rasterising PDF pages for the parser
page_image_dim = 1024

# ---------------------------------------------------------------------------
# Local transformer models (used when profile = "gpu")
# ---------------------------------------------------------------------------
[local_models]

# Embedding model — used for dense retrieval indexing and query encoding
embedding_model = "intfloat/e5-large-v2"

# Reranker — applied after sparse+dense fusion
reranker_model = "BAAI/bge-reranker-v2-m3"

# NLI model — for grounding confidence scoring
nli_model = "khalidalt/DeBERTa-v3-large-mnli"

# ---------------------------------------------------------------------------
# Parser settings
# ---------------------------------------------------------------------------
[parser]

# Primary PDF parser:
#   mlx_vlm              — MLX vision parser (set automatically for apple_silicon)
#   olmocr_transformers  — olmOCR transformers path (gpu default)
#   pymupdf_text         — lightweight text extraction (fast, lossy)
#   pypdf_text           — fallback text extraction
primary = "mlx_vlm"

# Fallback parser used when the primary parser fails on a page
fallback = "pymupdf_text"
